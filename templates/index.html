<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #cc0000; --red2: #e53935;
      --w: #fff; --g1: #f7f7f7; --g2: #ebebeb;
      --g4: #aaa; --g6: #666; --g8: #222;
      --bd: #e0e0e0; --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--g1); color: var(--g8); min-height: 100vh; }

    nav { background: var(--red); padding: 0 2rem; height: 52px; display: flex; align-items: center; gap: .75rem; box-shadow: 0 2px 6px rgba(0,0,0,.15); }
    .ball { width: 22px; height: 22px; border-radius: 50%; background: #fff; position: relative; }
    .ball::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:7px; height:7px; background:var(--red); border-radius:50%; border:1.5px solid rgba(255,255,255,.5); }
    nav span { font-size: 1.05rem; font-weight: 700; color: #fff; }

    main { max-width: 600px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

    .hero { text-align: center; margin-bottom: 1.75rem; }
    .hero h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .3rem; }
    .hero p { font-size: .9rem; color: var(--g4); }

    .search { background: var(--w); border: 1.5px solid var(--bd); border-radius: var(--radius); display: flex; align-items: center; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: border-color .2s, box-shadow .2s; }
    .search:focus-within { border-color: var(--red); box-shadow: 0 0 0 3px rgba(204,0,0,.08); }
    .search span { padding: 0 .85rem; color: var(--g4); user-select: none; }
    .search input { flex:1; border:none; outline:none; font-family:'Outfit',sans-serif; font-size:.95rem; padding:.72rem 0; background:transparent; color:var(--g8); }
    .search input::placeholder { color: var(--g4); }
    .search button { background:var(--red); color:#fff; border:none; font-family:'Outfit',sans-serif; font-size:.88rem; font-weight:600; padding:0 1.3rem; height:42px; cursor:pointer; transition:background .15s; }
    .search button:hover { background: var(--red2); }
    .hint { font-size: .76rem; color: var(--g4); margin-top: .45rem; text-align: center; }

    #loading { display:none; text-align:center; padding:3rem 0; color:var(--g4); font-size:.88rem; }
    .spinner { width:28px; height:28px; border:3px solid var(--g2); border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto .6rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error { display:none; background:#fff5f5; border:1.5px solid #ffcdd2; border-radius:var(--radius); padding:1rem 1.25rem; margin-top:1.25rem; font-size:.88rem; color:var(--red); }

    #card { display:none; background:var(--w); border:1.5px solid var(--bd); border-radius:var(--radius); margin-top:1.5rem; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,.10); animation:up .25s ease both; }
    @keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    .top { padding:1.4rem 1.5rem; display:flex; align-items:center; gap:1.2rem; background:var(--red); }
    .sprite { width:88px; height:88px; background:rgba(255,255,255,.2); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .sprite img { width:76px; height:76px; object-fit:contain; image-rendering:pixelated; filter:drop-shadow(0 2px 4px rgba(0,0,0,.18)); }
    .info { flex:1; min-width:0; }
    .num { font-size:.75rem; font-weight:500; color:rgba(255,255,255,.7); margin-bottom:.15rem; }
    .nome { font-size:1.4rem; font-weight:700; color:#fff; text-transform:capitalize; margin-bottom:.45rem; }
    .tipos { display:flex; gap:.35rem; flex-wrap:wrap; }
    .tipo { font-size:.7rem; font-weight:600; padding:2px 11px; border-radius:20px; background:rgba(255,255,255,.22); color:#fff; text-transform:capitalize; border:1.5px solid rgba(255,255,255,.35); }

    .body { padding:1.2rem 1.5rem; }
    .medidas { display:flex; gap:.75rem; margin-bottom:1.2rem; }
    .med { flex:1; background:var(--g1); border-radius:8px; padding:.65rem; text-align:center; border:1px solid var(--bd); }
    .med b { display:block; font-size:.95rem; color:var(--g8); }
    .med small { font-size:.7rem; color:var(--g4); }

    .sec { font-size:.7rem; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--g4); margin-bottom:.7rem; }
    .stat { display:flex; align-items:center; gap:.7rem; margin-bottom:.45rem; }
    .stat span { font-size:.78rem; color:var(--g6); width:95px; flex-shrink:0; }
    .bar-bg { flex:1; height:5px; background:var(--g2); border-radius:3px; overflow:hidden; }
    .bar { height:100%; border-radius:3px; width:0; transition:width .8s cubic-bezier(.4,0,.2,1); }
    .stat em { font-size:.78rem; font-weight:600; color:var(--g6); width:26px; text-align:right; font-style:normal; }
  </style>
</head>
<body>

<nav>
  <div class="ball"></div>
  <span>Pokédex</span>
</nav>

<main>
  <div class="hero">
    <h1>Encontre seu Pokémon</h1>
    <p>Busque pelo nome ou número da Pokédex</p>
  </div>

  <div class="search">
    <span>🔍</span>
    <input id="inp" type="text" placeholder="Ex: Nome do pokemon ou o número dele na pokédex" autocomplete="off" />
    <button onclick="buscar()">Buscar</button>
  </div>
  <div class="hint">Pressione Enter para buscar</div>

  <div id="loading"><div class="spinner"></div>Buscando...</div>
  <div id="error"></div>

  <div id="card">
    <div class="top" id="top">
      <div class="sprite"><img id="img" src="" alt="" /></div>
      <div class="info">
        <div class="num" id="num">#000</div>
        <div class="nome" id="nome">---</div>
        <div class="tipos" id="tipos"></div>
      </div>
    </div>
    <div class="body">
      <div class="medidas">
        <div class="med"><b id="altura">-</b><small>Altura</small></div>
        <div class="med"><b id="peso">-</b><small>Peso</small></div>
      </div>
      <div class="sec">Status base</div>
      <div id="stats"></div>
    </div>
  </div>
</main>

<script>
  const TIPOS = {
    fire:'#f08030',water:'#6890f0',grass:'#78c850',electric:'#f0c000',
    psychic:'#f85888',ice:'#98d8d8',dragon:'#7038f8',dark:'#705848',
    fairy:'#ee99ac',normal:'#a8a878',fighting:'#c03028',flying:'#a890f0',
    poison:'#a040a0',ground:'#c8a820',rock:'#b8a038',bug:'#a8b820',
    ghost:'#705898',steel:'#b8b8d0'
  };
  const STATS = { hp:'HP', attack:'Ataque', defense:'Defesa', 'special-attack':'Sp. Ataque', 'special-defense':'Sp. Defesa', speed:'Velocidade' };
  const barCor = v => v>=100?'#4caf50':v>=70?'#8bc34a':v>=50?'#ffb300':v>=30?'#ff7043':'#e53935';

  const el = id => document.getElementById(id);

  function loading() { el('loading').style.display='block'; el('card').style.display='none'; el('error').style.display='none'; }
  function erro(msg) { el('loading').style.display='none'; el('card').style.display='none'; el('error').style.display='block'; el('error').textContent='⚠️ '+msg; }
  function mostrar() { el('loading').style.display='none'; el('error').style.display='none'; const c=el('card'); c.style.animation='none'; void c.offsetWidth; c.style.animation=''; c.style.display='block'; }

  async function buscar() {
    const q = el('inp').value.trim();
    if (!q) { el('inp').focus(); return; }
    loading();
    try {
      const res  = await fetch(`/pokemon/${encodeURIComponent(q.toLowerCase())}`);
      const data = await res.json();
      if (!res.ok) { erro(data.detail || 'Pokémon não encontrado.'); return; }

      el('nome').textContent  = data.name.charAt(0).toUpperCase() + data.name.slice(1);
      el('num').textContent   = '#' + String(data.id).padStart(3,'0');
      el('img').src           = data.image || '';
      el('altura').textContent = data.height + ' m';
      el('peso').textContent   = data.weight + ' kg';
      el('top').style.background = TIPOS[data.types[0]] || '#cc0000';

      el('tipos').innerHTML = '';
      data.types.forEach(t => { const b=document.createElement('span'); b.className='tipo'; b.textContent=t; el('tipos').appendChild(b); });

      el('stats').innerHTML = '';
      Object.entries(data.stats).forEach(([s,v]) => {
        const pct = Math.min((v/255)*100,100).toFixed(1);
        const row = document.createElement('div');
        row.className = 'stat';
        row.innerHTML = `<span>${STATS[s]||s}</span><div class="bar-bg"><div class="bar" style="background:${barCor(v)}" data-w="${pct}%"></div></div><em>${v}</em>`;
        el('stats').appendChild(row);
      });

      mostrar();
      requestAnimationFrame(() => { document.querySelectorAll('.bar').forEach(b => b.style.width=b.dataset.w); });
    } catch(e) { erro('Não foi possível conectar ao servidor.'); }
  }

  el('inp').addEventListener('keydown', e => { if(e.key==='Enter') buscar(); });
</script>

</body>
</html>
